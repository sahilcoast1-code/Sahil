<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahil Coast - Page 3</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid #222;
}

header h1{
    font-size:32px;
    letter-spacing:2px;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border:1px solid #333;
    border-radius:8px;
}

nav a:hover{
    background:white;
    color:black;
}

/* SECTION */
.section{
    padding:40px 8%;
}

.title{
    font-size:24px;
    margin-bottom:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:15px;
    overflow:hidden;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    border-radius:10px;
}

.name{
    margin:10px 0;
    font-size:18px;
}

.price{
    color:#aaa;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    border-top:1px solid #222;
    margin-top:40px;
    color:#777;
}
</style>

</head>

<body>

<header>
<h1>Sahil Coast Shop</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="page3.html">Page 3</a>
</nav>

<div class="section">

<div class="title">New Collection</div>

<div class="grid">

<div class="card">
<img src="IMG_0435.jpeg">
<div class="name">Simple Joy Tee</div>
<div class="price">₪89</div>
</div>

<div class="card">
<img src="IMG_0436.jpeg">
<div class="name">Ocean Wave Tee</div>
<div class="price">₪79</div>
</div>

<div class="card">
<img src="IMG_0437.jpeg">
<div class="name">Coast Black Tee</div>
<div class="price">₪99</div>
</div>

<div class="card">
<img src="IMG_0438.jpeg">
<div class="name">Minimal Flower Tee</div>
<div class="price">₪69</div>
</div>

</div>

</div>

<footer>
@SahilCoast1
</footer>

</body>
</html>
